name: ci-cd

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          npm install
          npm install --prefix client
          npm install --prefix server

      - name: Lint client
        run: npm run lint --prefix client

      - name: Lint server
        run: npm run lint --prefix server

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          npm install
          npm install --prefix client
          npm install --prefix server

      - name: Build client
        run: npm run build --prefix client

  build-docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build

  deploy:
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy client to Vercel
        run: echo "Deploy client with Vercel token from secrets"

      - name: Deploy server to Render
        run: echo "Deploy server with Render API key from secrets"

      - name: Deploy ML service to Render
        run: echo "Deploy ML service with Render API key from secrets"
