services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  server:
    build:
      context: ./server
    env_file:
      - .env
    ports:
      - "5000:5000"
    depends_on:
      - redis
      - ml-service

  ml-service:
    build:
      context: ./ml-service
    env_file:
      - .env
    ports:
      - "8000:8000"

  client:
    build:
      context: ./client
    env_file:
      - .env
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  redis_data:
